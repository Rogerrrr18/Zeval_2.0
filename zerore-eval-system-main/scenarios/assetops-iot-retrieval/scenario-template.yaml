scenarioId: assetops-iot-retrieval
displayName: AssetOps IoT 数据检索
version: 1
description: 面向 AssetOpsBench 中 sites/assets/sensors/history 类 IoT 查询任务的评估 skill。

applicability:
  domains:
    - industrial-asset-operations
    - iot-sensor-data
  taskTypes:
    - Knowledge Query
    - Data Retrieval
    - Sensor History Query
  assetOpsBenchTools:
    - sites
    - assets
    - sensors
    - history
  notSuitableFor:
    - failure-mode-reasoning
    - time-series-forecasting
    - maintenance-recommendation

dataRequirements:
  requiredFields:
    - sessionId
    - role
    - content
  recommendedFields:
    - timestamp
    - toolName
    - toolArguments
    - toolResult
    - scenarioId
    - expectedAnswer
    - trace
  degradation:
    missingTimestamp: disable_time_metrics
    missingToolTrace: judge_final_answer_only

metricProfile:
  enabledCoreMetrics:
    - sessionDepthDistribution
    - avgResponseGapSec
    - topicSwitchRate
    - userQuestionRepeatRate
  customMetrics:
    - taskCompletion
    - dataRetrievalAccuracy
    - entityGroundingAccuracy
    - parameterBindingAccuracy
    - temporalFilterCorrectness
    - toolSequenceCorrectness
    - hallucinationControl

judgeRubrics:
  subjectiveDimensions:
    - id: taskCompletion
      displayName: 任务完成度
      scale: 1-5
      weight: 0.2
      llmRequired: true
    - id: dataRetrievalAccuracy
      displayName: 数据检索准确性
      scale: 1-5
      weight: 0.25
      llmRequired: true
    - id: entityGroundingAccuracy
      displayName: 实体落地准确性
      scale: 1-5
      weight: 0.2
      llmRequired: true
    - id: parameterBindingAccuracy
      displayName: 参数绑定准确性
      scale: 1-5
      weight: 0.15
      llmRequired: true
    - id: hallucinationControl
      displayName: 幻觉控制
      scale: 1-5
      weight: 0.2
      llmRequired: true
  outcomeJudges:
    - id: iotRetrievalSuccess
      displayName: IoT 检索成功
      ruleFirst: true
      llmFallback: true

businessKpis:
  - id: retrieval_reliability
    displayName: 检索可靠性
    description: Agent 是否正确识别站点、资产、传感器与时间范围，并返回真实数据。
    direction: higher-is-better
    mappedTo:
      primary:
        - source: subjective
          metricId: dataRetrievalAccuracy
          weight: 0.45
        - source: subjective
          metricId: entityGroundingAccuracy
          weight: 0.25
        - source: subjective
          metricId: parameterBindingAccuracy
          weight: 0.2
      secondary:
        - source: subjective
          metricId: hallucinationControl
          weight: 0.1
    successThreshold: 0.82
    degradedThreshold: 0.6
  - id: traceability
    displayName: 检索可追溯性
    description: 回答是否能追溯到正确工具调用、参数和返回数据。
    direction: higher-is-better
    mappedTo:
      primary:
        - source: subjective
          metricId: toolSequenceCorrectness
          weight: 0.5
        - source: subjective
          metricId: dataRetrievalAccuracy
          weight: 0.3
      secondary:
        - source: objective
          metricId: topicSwitchRate
          weight: -0.2
    successThreshold: 0.78
    degradedThreshold: 0.55

onboardingQuestions:
  - id: available_sites
    question: 本批数据中有哪些 site 名称？是否与 AssetOpsBench 默认 MAIN / PLANT_A 一致？
  - id: required_tool_trace
    question: 评估输入是否包含工具调用轨迹 toolName/toolArguments/toolResult？
  - id: expected_answer_source
    question: expectedAnswer 来自 characteristic_form、人工标注，还是工具真实返回？

